%==============================================================================
%  SU2 8.5 + SST / gamma-Re_theta (Langtry-Menter LM) 转捩模型  —— 高保真求解
%==============================================================================
%  方案 5.2。已按本环境 SU2 v8.5.0 "Harrier" 语法校准 (旧版 PHYSICAL_PROBLEM=
%  / KIND_TRANS_MODEL 之外的关键字均已更新)。
%
%  下列双花括号占位符由 hf_solver/run_su2.py 按工况填充, 不要手动改这些行:
%    AOA  RE  MACH  TU  TURB2LAM  ITER  MESH  CONV  RESTART
%
%  物理一致性: XFOIL Ncrit=9  <->  来流前缘 Tu≈0.1% (方案 1.2 Mack 换算)。
%  入口 Tu 设 0.2% 以补偿对流衰减, 首个验证工况实测前缘 Tu 后再反推校准。
%==============================================================================

%--------------------------- 物理模型 ----------------------------------------%
SOLVER= RANS
KIND_TURB_MODEL= SST
KIND_TRANS_MODEL= LM                  % Langtry-Menter gamma-Re_theta
SST_OPTIONS= V2003m
MATH_PROBLEM= DIRECT
RESTART_SOL= NO

%--------------------------- 来流条件 ----------------------------------------%
MACH_NUMBER= {{MACH}}
AOA= {{AOA}}
SIDESLIP_ANGLE= 0.0
FREESTREAM_TEMPERATURE= 288.15
REYNOLDS_NUMBER= {{RE}}
REYNOLDS_LENGTH= 1.0

% 来流湍流度 (衰减补偿见文件头说明)
FREESTREAM_TURBULENCEINTENSITY= {{TU}}
FREESTREAM_TURB2LAMVISCRATIO= {{TURB2LAM}}

%--------------------------- 参考量 ------------------------------------------%
REF_ORIGIN_MOMENT_X= 0.25
REF_ORIGIN_MOMENT_Y= 0.00
REF_ORIGIN_MOMENT_Z= 0.00
REF_LENGTH= 1.0
REF_AREA= 1.0
REF_DIMENSIONALIZATION= DIMENSIONAL

%--------------------------- 边界条件 ----------------------------------------%
% 标记名须与 geometry/mesh_generator.py 物理组一致 (airfoil / farfield)
MARKER_HEATFLUX= ( airfoil, 0.0 )     % 绝热无滑移壁面
MARKER_FAR= ( farfield )
MARKER_PLOTTING= ( airfoil )
MARKER_MONITORING= ( airfoil )

%--------------------------- 数值格式: 流动 ----------------------------------%
NUM_METHOD_GRAD= GREEN_GAUSS
CONV_NUM_METHOD_FLOW= JST           % 中心格式 (含 JST 人工耗散), 须 MUSCL_FLOW= NO
MUSCL_FLOW= NO
JST_SENSOR_COEFF= ( 0.5, 0.02 )
TIME_DISCRE_FLOW= EULER_IMPLICIT

%--------------------------- 数值格式: 湍流/转捩 -----------------------------%
CONV_NUM_METHOD_TURB= SCALAR_UPWIND
MUSCL_TURB= NO
TIME_DISCRE_TURB= EULER_IMPLICIT
CFL_REDUCTION_TURB= 1.0

%--------------------------- 隐式求解 / CFL ----------------------------------%
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 1E-6
LINEAR_SOLVER_ITER= 10

% 转捩模型对初值敏感, 从低 CFL 起步, 自适应增长。
% CFL_ADAPT_PARAM= ( factor-down, factor-up, CFL-min, CFL-max )
CFL_NUMBER= 2.0
CFL_ADAPT= YES
CFL_ADAPT_PARAM= ( 0.1, 2.0, 2.0, 100.0 )

%--------------------------- 收敛 / 迭代 -------------------------------------%
ITER= {{ITER}}
CONV_FIELD= RMS_DENSITY
CONV_RESIDUAL_MINVAL= -12
CONV_STARTITER= 10
CONV_CAUCHY_ELEMS= 100
CONV_CAUCHY_EPS= 1E-6

%--------------------------- 网格 --------------------------------------------%
MESH_FILENAME= {{MESH}}
MESH_FORMAT= SU2

%--------------------------- 输出 --------------------------------------------%
OUTPUT_FILES= ( RESTART, PARAVIEW, SURFACE_CSV )
RESTART_FILENAME= {{RESTART}}
CONV_FILENAME= {{CONV}}
HISTORY_OUTPUT= ( ITER, RMS_RES, AERO_COEFF )
SCREEN_OUTPUT= ( INNER_ITER, RMS_DENSITY, RMS_TKE, LIFT, DRAG )
SCREEN_WRT_FREQ_INNER= 200
OUTPUT_WRT_FREQ= 1000
